# ==============================================================================
# Zendure v130 - Optional helpers for pyscript/zendure_p1_fast_controller.py
# ------------------------------------------------------------------------------
# IMPORTANT:
# - Wenn du `zendure_v130.yaml` benutzt, brauchst du diese Datei NICHT zusätzlich.
# - Diese Datei ist nur für Standalone-Setups gedacht.
# Ablageempfehlung (Standalone):
# - /config/packages/zendure_v130_pyscript_helpers.yaml
# - /config/pyscript/zendure_p1_fast_controller.py
# ==============================================================================

input_boolean:
  zendure_auto_mode:
    name: "Zendure Auto Mode"
    initial: on
    icon: mdi:robot

input_number:
  zendure_target_total:
    name: "Zendure Target Total"
    min: 0
    max: 1600
    step: 1
    mode: box
    unit_of_measurement: W
    initial: 0
  zendure_last_sent_1:
    name: "Zendure Last Sent U1"
    min: 0
    max: 800
    step: 1
    mode: box
    unit_of_measurement: W
    initial: 0
  zendure_last_sent_2:
    name: "Zendure Last Sent U2"
    min: 0
    max: 800
    step: 1
    mode: box
    unit_of_measurement: W
    initial: 0
  zendure_conf_grid_bias:
    name: "Zendure Grid Bias"
    min: -100
    max: 100
    step: 1
    mode: box
    unit_of_measurement: W
    initial: 10
  zendure_conf_hysteresis:
    name: "Zendure Hysteresis"
    min: 0
    max: 50
    step: 1
    mode: box
    unit_of_measurement: W
    initial: 8
  zendure_conf_max_output:
    name: "Zendure Max Output"
    min: 0
    max: 1600
    step: 10
    mode: box
    unit_of_measurement: W
    initial: 1200
